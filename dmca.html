<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contenido no disponible</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap">
  <style>
    body {
      font-family: Montserrat, sans-serif;
      font-size: 16px;
      overflow: hidden;
      background-color: white;
    }
    
    .contenido-no-disponible {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .titulo {
      font-size: 20px;
      font-weight: 600;
    }
    
    .texto {
      font-size: 16px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="contenido-no-disponible">
    <h2 class="titulo">Contenido no disponible</h2>
    <p class="texto">Lamentablemente este contenido no está disponible ahora, pero estará disponible mañana. Regresa mañana :)</p>
  </div>
</body>
</html>
