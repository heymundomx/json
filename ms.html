<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <title>Mangas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .title {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .images img {
      width: 100%;
      max-width: 400px;
      height: auto;
    }
    .text {
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }
    @media (max-width: 767px) {
      .container {
        grid-template-columns: 1fr;
      }
      .images {
        grid-template-columns: 1fr;
      }
      .text {
        font-size: 16px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">
  <title>Mangas</title>
</head>
<body>
  <div class="container">
    <h1 class="title">Mangas y Cómics</h1>
    <p class="subtitle">Imágenes...</p>
    <div class="images">
      <img src="./img/1.png" alt="Imagen 1">
      <img src="./img/2.png" alt="Imagen 2">
      <img src="./img/3.png" alt="Imagen 3">
      <img src="./img/4.png" alt="Imagen 4">
    </div>
    <p class="rate-app">Visita nuestro perfil de desarrollador: <a href="https://play.google.com/store/apps/dev?id=7608677967894553639">aquí</a>.</p>
    <p class="text">Muchas gracias</p>
  </div>
</body>
</html>
