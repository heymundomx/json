<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <title>Mangas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .title {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .images img {
      width: 100%;
      max-width: 400px;
      height: auto;
      cursor: pointer;
    }
    .chapter-text {
      display: none;
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }
    .play-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #121212;
            color: #ffffff;
            text-decoration: none;
            border-radius: 20px;
            margin-left: 10px;
            text-align: center;
    }
    @media (max-width: 767px) {
      .container {
        grid-template-columns: 1fr;
      }
      .images {
        grid-template-columns: 1fr;
      }
      .play-button {
            font-size: 11px;
            padding: 20px 15px;
            background-color: #121212;
            color: #ffffff;
            border-radius: 20px;
            text-align: center;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">
  <title>Bienvenido</title>
</head>
<body>
  <div class="container">
    <h1 class="title">Mangas</h1>
    <div class="images">
      <div>
        <img src="./img/1.png" alt="Imagen 1" onclick="showChapter('chapter1')">
        <p class="chapter-text" id="chapter1">Capítulo 1: Este es el capítulo 1 creado por mí.</p>
      </div>
      <div>
        <img src="./img/2.png" alt="Imagen 2" onclick="showChapter('chapter2')">
        <p class="chapter-text" id="chapter2">Capítulo 2: Este es el capítulo 2 creado por mí.</p>
      </div>
      <div>
        <img src="./img/3.png" alt="Imagen 3" onclick="showChapter('chapter3')">
        <p class="chapter-text" id="chapter3">Capítulo 3: Este es el capítulo 3 creado por mí.</p>
      </div>
      <div>
        <img src="./img/4.png" alt="Imagen 4" onclick="showChapter('chapter4')">
        <p class="chapter-text" id="chapter4">Capítulo 4: Este es el capítulo 4 creado por mí.</p>
      </div>
    </div>
    <a href="https://play.google.com/store/apps/dev?id=7608677967894553639" class="play-button">Nuestras aplicaciones</a>
    <!--<p class="text">Muchas gracias</p>-->
  </div>

  <script>
    function showChapter(chapterId) {
      const chapterText = document.getElementById(chapterId);
      const parentDiv = chapterText.parentElement;
      const imagesDiv = parentDiv.parentElement;

      // Obtén todas las imágenes dentro del contenedor de imágenes
      const images = imagesDiv.getElementsByClassName('images')[0].getElementsByTagName('img');

      // Recorre todas las imágenes y muestra/oculta la imagen y texto correspondientes
      for (let i = 0; i < images.length; i++) {
        if (images[i].getAttribute('onclick') === `showChapter('${chapterId}')`) {
          // Muestra la imagen y el texto del capítulo seleccionado
          images[i].style.display = 'block';
          chapterText.style.display = 'block';
        } else {
          // Oculta las demás imágenes y textos
          images[i].style.display = 'none';
          images[i].nextElementSibling.style.display = 'none';
        }
      }

      // Mueve la imagen seleccionada y el texto al principio
      parentDiv.prepend(parentDiv.removeChild(imagesDiv.previousElementSibling));
      parentDiv.prepend(chapterText.parentElement);
    }
  </script>
</body>
</html>
