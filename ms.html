<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <title>Mangas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .title {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .images img {
      width: 100%;
      max-width: 400px;
      height: auto;
      cursor: pointer;
    }
    .chapter-text {
      display: none;
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }
    .play-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #121212;
            color: #ffffff;
            text-decoration: none;
            border-radius: 20px;
            margin-left: 10px;
            text-align: center;
    }
    @media (max-width: 767px) {
      .container {
        grid-template-columns: 1fr;
      }
      .images {
        grid-template-columns: 1fr;
      }
      .play-button {
            font-size: 11px;
            padding: 20px 15px;
            background-color: #121212;
            color: #ffffff;
            border-radius: 20px;
            text-align: center;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">
  <title>Bienvenido</title>
</head>
<body>
  <div class="container">
    <h1 class="title">Mangas</h1>
    <div class="images">
      <div>
        <img src="./img/1.png" alt="Imagen 1" onclick="toggleChapter('chapter1')">
        <p class="chapter-text" id="chapter1" style="display: none;">Capítulo 1: Este es el capítulo 1 creado por mí.</p>
      </div>
      <div>
        <img src="./img/2.png" alt="Imagen 2" onclick="toggleChapter('chapter2')">
        <p class="chapter-text" id="chapter2" style="display: none;">Capítulo 2: Este es el capítulo 2 creado por mí.</p>
      </div>
      <div>
        <img src="./img/3.png" alt="Imagen 3" onclick="toggleChapter('chapter3')">
        <p class="chapter-text" id="chapter3" style="display: none;">Capítulo 3: Este es el capítulo 3 creado por mí.</p>
      </div>
      <div>
        <img src="./img/4.png" alt="Imagen 4" onclick="toggleChapter('chapter4')">
        <p class="chapter-text" id="chapter4" style="display: none;">Capítulo 4: Este es el capítulo 4 creado por mí.</p>
      </div>
    </div>
    <a href="https://play.google.com/store/apps/dev?id=7608677967894553639" class="play-button">Nuestras aplicaciones</a>
    <!--<p class="text">Muchas gracias</p>-->
  </div>

  <script>
    function toggleChapter(id) {
      var chapter = document.getElementById(id);
      if (chapter.style.display === "none") {
        chapter.style.display = "block";
      } else {
        chapter.style.display = "none";
      }
    }
  </script>
</body>
</html>
