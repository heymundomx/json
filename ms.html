<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <title>Mangas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .title {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .images img {
      width: 100%;
      max-width: 400px;
      height: auto;
      cursor: pointer;
    }
    .text {
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }
    .chapter-text {
      display: none;
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }
    @media (max-width: 767px) {
      .container {
        grid-template-columns: 1fr;
      }
      .images {
        grid-template-columns: 1fr;
      }
      .text {
        font-size: 16px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&amp;display=swap" rel="stylesheet">
  <title>Mangas</title>
</head>
<body>
  <div class="container">
    <h1 class="title">Mangas</h1>
    <p class="subtitle">Imágenes de Mangas...</p>
    <div class="images">
      <div>
        <img src="./img/1.png" alt="Imagen 1" onclick="showChapter('chapter1')">
        <p class="chapter-text" id="chapter1">Capítulo 1: Este es el capítulo 1 creado por mí.</p>
      </div>
      <div>
        <img src="./img/2.png" alt="Imagen 2" onclick="showChapter('chapter2')">
        <p class="chapter-text" id="chapter2">Capítulo 2: Este es el capítulo 2 creado por mí.</p>
      </div>
      <div>
        <img src="./img/3.png" alt="Imagen 3" onclick="showChapter('chapter3')">
        <p class="chapter-text" id="chapter3">Capítulo 3: Este es el capítulo 3 creado por mí.</p>
      </div>
      <div>
        <img src="./img/4.png" alt="Imagen 4" onclick="showChapter('chapter4')">
        <p class="chapter-text" id="chapter4">Capítulo 4: Este es el capítulo 4 creado por mí.</p>
      </div>
    </div>
    <p class="rate-app">Visita nuestro perfil de desarrollador: <a href="https://play.google.com/store/apps/dev?id=7608677967894553639">aquí</a>.</p>
    <p class="text">Muchas gracias</p>
  </div>

  <script>
    function showChapter(chapterId) {
      const chapterText = document.getElementById(chapterId);
      const images = document.querySelectorAll('.images div');

      images.forEach(image => {
        image.childNodes[1].style.display = 'none';
      });

      chapterText.style.display = 'block';
    }
  </script>
</body>
</html>
