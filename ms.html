<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMO+ en Playstore</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      line-height: 1.5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      margin-top: auto;
      text-align: center;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 40px;
      margin: 20px auto;
      background-color: #195C63;
      color: #FFFFFF;
      border: 2px solid black;
      border-radius: 20px;
      text-decoration: none;
      line-height: 40px;
      font-size: 16px;
      text-align: center;
    }

    @media only screen and (max-width: 600px) {
      body {
        margin: 10px;
      }
      .button {
        width: 100%;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <p>Hola, si te gustaría descargar nuestra nueva aplicación, haz clic en el siguiente botón (si es posible, déjanos una reseña positiva):</p>

  <a class="button" href="https://play.google.com/store/apps/details?id=com.tmoplus.app">Playstore</a>
</body>
</html>
